# Copy to /etc/nginx/sites-available/api.yourdomain.com on the VPS,
# symlink into sites-enabled, then run certbot --nginx to add TLS.
# Replace api.yourdomain.com throughout.

server {
    listen 80;
    listen [::]:80;
    server_name api.yourdomain.com;

    # certbot rewrites this block on first run: it adds the listen 443
    # server, the cert paths, and an http -> https redirect.

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }
}
